modules:
  jira:issuePanel:
    - key: antigravity-agent-issue-panel
      resource: main
      resolver:
        function: resolver
      render: native
      title: Antigravity Agent
      icon: https://raw.githubusercontent.com/gitrey/jira-managed-agents/main/Antigravity-Agent/static/icon.png
  function:
    - key: resolver
      handler: index.handler
resources:
  - key: main
    path: src/frontend/index.jsx
app:
  runtime:
    name: nodejs24.x
    memoryMB: 256
    architecture: arm64
  id: ari:cloud:ecosystem::app/2cbbd697-90ae-4afe-8376-f96d519c861a
permissions:
  scopes:
    - read:jira-work
    - write:jira-work
  external:
    fetch:
      backend:
        - 'aiplatform.googleapis.com'
        - 'oauth2.googleapis.com'